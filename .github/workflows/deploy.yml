name: CI/CD - Compilar y desplegar JAR

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Compilar proyecto
        run: mvn clean compile

      - name: Ejecutar pruebas
        run: mvn test

      - name: Construir JAR
        run: mvn package

      - name: Subir JAR a rama deploy-artifacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Guardar temporalmente el jar
          mkdir temp-jar
          cp target/*.jar temp-jar/

          # Limpiar el directorio de trabajo (evita conflicto con git switch)
          rm -rf *

          # Cambiar a rama vacía sin historial
          git fetch origin
          git switch --orphan deploy-artifacts
          git reset --hard
          git clean -fd

          # Recuperar el .jar y subirlo
          cp temp-jar/*.jar .
          git add *.jar
          git commit -m "Despliegue automático del JAR"
          git push --force origin deploy-artifacts
