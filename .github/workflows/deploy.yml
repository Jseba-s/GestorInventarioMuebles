name: CI/CD - Compilar y desplegar JAR

on:
  push:
    branches: [ main ]

permissions:
      contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Compilar el proyecto
        run: mvn clean compile

      - name: Ejecutar pruebas
        run: mvn test

      - name: Empaquetar JAR
        run: mvn package

      - name: Verificar que el JAR fue generado
        run: |
          ls -l target/
          test -f target/*.jar

      - name: Subir JAR como artefacto (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: gestor-muebles-jar
          path: target/*.jar

      - name: Subir JAR a rama deploy-artifacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Guardar el JAR en un lugar fuera del repositorio (seguro)
          mkdir -p $HOME/temp-jar
          cp target/*.jar $HOME/temp-jar/

          # Eliminar directorio target para evitar conflicto de git
          rm -rf target/

          # Cambiar a rama 'deploy-artifacts' desde cero
          git fetch origin
          git switch --orphan deploy-artifacts
          git reset --hard
          git clean -fd

          # Restaurar el JAR desde la ruta segura
          cp $HOME/temp-jar/*.jar .

          # Subir el JAR a la nueva rama
          git add *.jar
          git commit -m "Despliegue automático del JAR"
          git push --force origin deploy-artifacts
